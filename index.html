<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Lock For Long</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="user-profile">
                    <img id="userAvatar" src="" alt="User" class="avatar">
                    <span id="userName">User</span>
                </div>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
            <h1>Lock For Long</h1>
            <p class="subtitle">Your Digital Time Capsule</p>
        </header>

        <main>
            <!-- Storage Info -->
            <section class="glass-panel storage-info">
                <div class="storage-header">
                    <span>Vault Capacity</span>
                    <span id="storageUsed">0 B / 64 GB</span>
                </div>
                <div class="progress-bar">
                    <div id="storageProgressBar" class="progress-fill"></div>
                </div>
            </section>

            <!-- Category Grid -->
            <div class="category-grid">
                <div class="category-card glass-panel" data-type="image">
                    <div class="cat-icon">🖼️</div>
                    <span class="cat-name">Photos</span>
                    <span class="cat-count" id="count-image">0</span>
                </div>
                <div class="category-card glass-panel" data-type="video">
                    <div class="cat-icon">🎬</div>
                    <span class="cat-name">Videos</span>
                    <span class="cat-count" id="count-video">0</span>
                </div>
                <div class="category-card glass-panel" data-type="audio">
                    <div class="cat-icon">🎵</div>
                    <span class="cat-name">Audio</span>
                    <span class="cat-count" id="count-audio">0</span>
                </div>
                <div class="category-card glass-panel" data-type="document">
                    <div class="cat-icon">📄</div>
                    <span class="cat-name">Documents</span>
                    <span class="cat-count" id="count-document">0</span>
                </div>
                <div class="category-card glass-panel" data-type="apk">
                    <div class="cat-icon">📦</div>
                    <span class="cat-name">APKs</span>
                    <span class="cat-count" id="count-apk">0</span>
                </div>
                <div class="category-card glass-panel" data-type="archive">
                    <div class="cat-icon">🗄️</div>
                    <span class="cat-name">Archives</span>
                    <span class="cat-count" id="count-archive">0</span>
                </div>
            </div>
        </main>

        <!-- Floating Action Button -->
        <a href="upload.html" class="floating-btn" id="floatingAddBtn">
            <span>+</span>
        </a>
    </div>

    <script src="app.js"></script>
    <script>
        // Specific Dashboard logic
        document.querySelectorAll('.category-card').forEach(card => {
            card.addEventListener('click', () => {
                window.location.href = `vault.html?type=${card.dataset.type}`;
            });
        });
    </script>
</body>
</html>
